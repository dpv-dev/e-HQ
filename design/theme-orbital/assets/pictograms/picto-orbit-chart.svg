<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Orbital picto — orbit chart: analytics, P&L, dashboards -->
  <defs>
    <filter id="pc" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.6"/></filter>
    <linearGradient id="pcTrail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFB800" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g stroke="#2FD4FF" stroke-width="5" stroke-linecap="round">
    <line x1="34" y1="66" x2="34" y2="50"/>
    <line x1="48" y1="66" x2="48" y2="36"/>
    <line x1="62" y1="66" x2="62" y2="44"/>
  </g>
  <line x1="34" y1="50" x2="34" y2="50" stroke="#7CE7FF" stroke-width="5" stroke-linecap="round" filter="url(#pc)" opacity=".7"/>
  <line x1="24" y1="72" x2="72" y2="72" stroke="#2FD4FF" stroke-width="1.6" opacity=".5"/>
  <ellipse cx="48" cy="52" rx="34" ry="13" stroke="url(#pcTrail)" stroke-width="1.6" transform="rotate(-16 48 52)"/>
  <circle cx="20" cy="42" r="3" fill="#FFB800"/>
  <circle cx="20" cy="42" r="6" fill="#FFB800" opacity=".25" filter="url(#pc)"/>
  <circle cx="48" cy="36" r="2.2" fill="#7CE7FF"/>
</svg>
