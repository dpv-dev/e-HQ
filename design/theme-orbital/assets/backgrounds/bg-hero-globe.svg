<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Theme Orbital — hero background. Data sphere with cyan atmosphere and
       amber orbital trails. Primitives + gradients only: NO SVG filters —
       large feGaussianBlur regions are GPU-expensive and can stall low-power
       compositors when the hero scrolls. All glows are radial gradients. -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#071019"/>
      <stop offset="55%" stop-color="#05090D"/>
      <stop offset="100%" stop-color="#030608"/>
    </radialGradient>
    <radialGradient id="sphereShade" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#0B1B28"/>
      <stop offset="60%" stop-color="#071219"/>
      <stop offset="100%" stop-color="#04222E"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="78%" stop-color="#2FD4FF" stop-opacity="0"/>
      <stop offset="92%" stop-color="#2FD4FF" stop-opacity=".35"/>
      <stop offset="99%" stop-color="#7CE7FF" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#7CE7FF" stop-opacity=".9"/>
    </radialGradient>
    <!-- annular outer glow: transparent core, bright at the sphere edge, fading out -->
    <radialGradient id="rimGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#2FD4FF" stop-opacity="0"/>
      <stop offset="74%" stop-color="#2FD4FF" stop-opacity=".30"/>
      <stop offset="80%" stop-color="#2FD4FF" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#2FD4FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A3C" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFB800" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#FF8A3C" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dataDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#2FD4FF"/>
      <circle cx="12" cy="12" r=".9" fill="#7CE7FF"/>
    </pattern>
    <radialGradient id="dotFade" cx="42%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".14"/>
      <stop offset="65%" stop-color="#fff" stop-opacity=".38"/>
      <stop offset="96%" stop-color="#fff" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotMask"><circle cx="800" cy="520" r="298" fill="url(#dotFade)"/></mask>
    <!-- gradient dots replace blurred bokeh circles -->
    <radialGradient id="bokehCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2FD4FF" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#2FD4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokehAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A3C" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#FF8A3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="satGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity=".55"/>
      <stop offset="35%" stop-color="#FFB800" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#vignette)"/>

  <!-- distant bokeh (pure gradients) -->
  <circle cx="215" cy="188" r="70" fill="url(#bokehCyan)"/>
  <circle cx="1408" cy="640" r="80" fill="url(#bokehAmber)"/>
  <circle cx="1290" cy="150" r="46" fill="url(#bokehCyan)"/>
  <circle cx="352" cy="705" r="54" fill="url(#bokehCyan)"/>

  <!-- outer atmosphere glow (annular gradient, replaces blurred strokes) -->
  <circle cx="800" cy="520" r="430" fill="url(#rimGlow)"/>

  <!-- hairline crossing arcs -->
  <g stroke="#2FD4FF" fill="none" opacity=".10">
    <ellipse cx="800" cy="520" rx="640" ry="212" stroke-width="1" transform="rotate(-14 800 520)"/>
    <ellipse cx="800" cy="520" rx="712" ry="168" stroke-width=".8" transform="rotate(9 800 520)"/>
  </g>

  <!-- sphere -->
  <circle cx="800" cy="520" r="300" fill="url(#sphereShade)"/>
  <circle cx="800" cy="520" r="298" fill="url(#dataDots)" mask="url(#dotMask)"/>

  <!-- graticule -->
  <g stroke="#2FD4FF" fill="none" opacity=".14">
    <ellipse cx="800" cy="520" rx="300" ry="300" stroke-width="1"/>
    <ellipse cx="800" cy="520" rx="218" ry="300" stroke-width=".8"/>
    <ellipse cx="800" cy="520" rx="118" ry="300" stroke-width=".8"/>
    <ellipse cx="800" cy="520" rx="300" ry="212" stroke-width=".8"/>
    <ellipse cx="800" cy="520" rx="300" ry="104" stroke-width=".8"/>
    <line x1="500" y1="520" x2="1100" y2="520" stroke-width=".8"/>
  </g>

  <!-- atmosphere rim (gradient ring + two crisp strokes at falling opacity) -->
  <circle cx="800" cy="520" r="300" fill="url(#atmo)"/>
  <circle cx="800" cy="520" r="301.5" fill="none" stroke="#7CE7FF" stroke-width="1.6" opacity=".5"/>
  <circle cx="800" cy="520" r="305" fill="none" stroke="#2FD4FF" stroke-width="4" opacity=".14"/>

  <!-- amber orbital trails + satellites (gradient halos, no filters) -->
  <g fill="none">
    <ellipse cx="800" cy="520" rx="392" ry="126" stroke="url(#trail)" stroke-width="1.6" opacity=".8" transform="rotate(-18 800 520)"/>
    <ellipse cx="800" cy="520" rx="452" ry="94"  stroke="url(#trail)" stroke-width="1.2" opacity=".55" transform="rotate(12 800 520)"/>
    <ellipse cx="800" cy="520" rx="348" ry="170" stroke="url(#trail)" stroke-width="1.1" opacity=".45" transform="rotate(-40 800 520)"/>
  </g>
  <circle cx="474" cy="418" r="14" fill="url(#satGlow)"/>
  <circle cx="474" cy="418" r="3.4" fill="#FFB800" opacity=".95"/>
  <circle cx="1178" cy="626" r="12" fill="url(#satGlow)"/>
  <circle cx="1178" cy="626" r="2.6" fill="#FFB800" opacity=".9"/>
  <circle cx="1102" cy="330" r="2.2" fill="#FFB800" opacity=".8"/>

  <!-- luminous data nodes on the sphere -->
  <g fill="#7CE7FF">
    <circle cx="712" cy="392" r="2.6" opacity=".9"/>
    <circle cx="905" cy="452" r="2.2" opacity=".8"/>
    <circle cx="838" cy="610" r="2.4" opacity=".85"/>
    <circle cx="668" cy="560" r="1.9" opacity=".7"/>
    <circle cx="948" cy="562" r="1.8" opacity=".7"/>
    <circle cx="770" cy="480" r="1.6" opacity=".6"/>
  </g>
  <g stroke="#2FD4FF" opacity=".30" fill="none" stroke-width=".9">
    <path d="M712 392 Q 800 400 905 452"/>
    <path d="M905 452 Q 900 540 838 610"/>
    <path d="M712 392 Q 660 480 668 560"/>
  </g>

  <!-- particle field -->
  <g fill="#BFEFFF">
    <circle cx="128" cy="486" r="1.4" opacity=".5"/><circle cx="248" cy="316" r="1.1" opacity=".4"/>
    <circle cx="418" cy="132" r="1.5" opacity=".45"/><circle cx="612" cy="86"  r="1.1" opacity=".35"/>
    <circle cx="986" cy="104" r="1.6" opacity=".5"/><circle cx="1192" cy="238" r="1.2" opacity=".4"/>
    <circle cx="1362" cy="422" r="1.5" opacity=".45"/><circle cx="1466" cy="300" r="1"  opacity=".35"/>
    <circle cx="1258" cy="770" r="1.4" opacity=".4"/><circle cx="1052" cy="836" r="1.2" opacity=".35"/>
    <circle cx="700" cy="856" r="1.5" opacity=".4"/><circle cx="438" cy="810" r="1.1" opacity=".35"/>
    <circle cx="238" cy="640" r="1.3" opacity=".4"/><circle cx="86"  cy="760" r="1"  opacity=".3"/>
    <circle cx="1530" cy="560" r="1.2" opacity=".35"/><circle cx="540" cy="260" r="1.2" opacity=".4"/>
  </g>
</svg>
