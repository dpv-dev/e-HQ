<svg class="cmd" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="command center"><style>
@keyframes flick{0%,100%{opacity:.8}45%{opacity:1}70%{opacity:.9}}
@keyframes bar{0%,100%{transform:scaleY(.7)}50%{transform:scaleY(1)}}
@keyframes blip{0%,100%{opacity:.15}50%{opacity:1}}
@keyframes eglow{0%,100%{opacity:.22;transform:scale(1)}50%{opacity:.6;transform:scale(1.08)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes sweep{0%{transform:translateX(-200px);opacity:0}15%{opacity:.45}85%{opacity:.45}100%{transform:translateX(700px);opacity:0}}
@keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.7}100%{transform:translateY(-150px);opacity:0}}
@keyframes beam{0%,100%{opacity:.05}50%{opacity:.14}}
.wall{animation:floaty 7s ease-in-out infinite}
.flick{animation:flick 3.2s ease-in-out infinite}
.bar{transform-box:fill-box;transform-origin:center bottom;animation:bar 1.9s ease-in-out infinite}
.blip{animation:blip 2.6s ease-in-out infinite}
.eglow{transform-box:fill-box;transform-origin:center;animation:eglow 3.6s ease-in-out infinite}
.sweep{animation:sweep 6.5s ease-in-out infinite}
.pt{animation:rise 7s linear infinite}
.beam{animation:beam 5s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){.wall,.flick,.bar,.blip,.eglow,.sweep,.pt,.beam{animation:none!important}}
