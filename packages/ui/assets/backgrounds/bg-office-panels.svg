      <rect x="-10" y="-176" width="230" height="150" rx="16" fill="rgba(255,255,255,.05)" stroke="#FFB800" stroke-opacity=".42"/>
      <rect x="14" y="-152" width="96" height="12" rx="6" fill="#FFB800" fill-opacity=".8"/>
      <rect x="14" y="-126" width="182" height="8" rx="4" fill="#FFFFFF" fill-opacity=".12"/>
