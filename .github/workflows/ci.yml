name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - theme/distribution-command

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-node resolves the pnpm cache path during initialisation.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Canonical build gate
        run: ./deploy-build.sh

      - name: Generate parser parity report
        run: corepack pnpm --filter @ehq/api parser:parity-report

      - name: Upload parser parity report artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser-parity-report
          path: services/api/output/parser-parity-report.json
          if-no-files-found: error
